# railway.toml — tells Railway how to build and run the backend service
# Docs: https://docs.railway.app/reference/config-as-code
#
# In the Railway dashboard, set "Root Directory" → backend/
# This file handles everything else (build, start, health check).

[build]
builder = "nixpacks"

[deploy]
startCommand = "python -m app.main"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
