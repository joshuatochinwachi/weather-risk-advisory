# nixpacks.toml — tells Nixpacks (Railway's build system) this is a Python app
# Placed inside backend/ so it's picked up when Root Directory = backend/

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "python -m app.main"
